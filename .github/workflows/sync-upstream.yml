name: Sync Upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/wakatime/vscode-wakatime.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if upstream differs
        id: diff
        run: |
          git checkout master
          git fetch upstream

          if git diff --quiet master upstream/master; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git checkout -B sync-upstream
          git reset --hard upstream/master

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-upstream
          base: master
          title: "Sync upstream changes"
          body: "Automated upstream sync from wakatime/vscode-wakatime."
          commit-message: "Sync upstream"
          delete-branch: true